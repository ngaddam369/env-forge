---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-api
  namespace: default
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-api-data
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-api
  namespace: default
  labels:
    app: forge-api
spec:
  replicas: 1
  # RollingUpdate ensures zero-downtime rollouts. With a single replica and a
  # PVC (ReadWriteOnce), maxSurge must be 0 to avoid two pods competing for the
  # same volume on the same node.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: forge-api
  template:
    metadata:
      labels:
        app: forge-api
    spec:
      serviceAccountName: forge-api
      containers:
        - name: forge-api
          # Pin to a specific version in production — do not use :latest.
          image: ghcr.io/ngaddam369/env-forge-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: api
          env:
            - name: STEP_ADDR
              value: ":9090"
            - name: DB_PATH
              value: /data/env-forge.db
            - name: CONDUCTOR_ADDR
              value: "saga-conductor.default.svc.cluster.local:8080"
            - name: FORGE_WORKER_URL
              value: "http://forge-worker.default.svc.cluster.local:9091"
            - name: SVIDEXCHANGE_JWKS_URL
              value: "http://svid-exchange.default.svc.cluster.local:8081/jwks"
            - name: TRUST_DOMAIN
              value: "cluster.local"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # initialDelaySeconds must accommodate the JWKS retry loop (up to 10
          # attempts × 3 s = 30 s) plus startup time.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9090
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forge-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: forge-api
  namespace: default
spec:
  selector:
    app: forge-api
  ports:
    - name: api
      port: 9090
      targetPort: 9090
