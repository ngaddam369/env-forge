---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: svid-exchange-data
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: svid-exchange-config
  namespace: default
data:
  server.yaml: |
    grpc_addr:   ":8080"
    health_addr: ":8081"
    admin_addr:  ":8082"
    grpc_reflection: true
    otlp_endpoint: ""
    grpc_max_concurrent_streams: 100
    grpc_max_recv_msg_size_kb:   4096
    rate_limit_rps:   50
    rate_limit_burst: 10
    key_rotation_interval: "1h"
    admin_subjects: []
  policy.yaml: |
    # Exchange policies for env-forge provisioned environments.
    # Dynamic policies are added via the admin gRPC API (identity step).
    policies:
      # forge-worker exchanges its SVID for a JWT to call forge-api internal endpoints.
      - name: forge-worker-to-forge-api
        subject: "spiffe://cluster.local/ns/default/sa/forge-worker"
        target:  "spiffe://cluster.local/ns/default/sa/forge-api"
        allowed_scopes: ["env:read", "env:write"]
        max_ttl: 3600
      # Placeholder satisfies startup validation; uses unreachable IDs so it never matches.
      - name: placeholder
        subject: "spiffe://cluster.local/placeholder/unused"
        target:  "spiffe://cluster.local/placeholder/unused"
        allowed_scopes: ["placeholder"]
        max_ttl: 1
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: svid-exchange
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svid-exchange
  namespace: default
  labels:
    app: svid-exchange
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: svid-exchange
  template:
    metadata:
      labels:
        app: svid-exchange
    spec:
      serviceAccountName: svid-exchange
      containers:
        - name: svid-exchange
          image: ghcr.io/ngaddam369/svid-exchange:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 8081
              name: health
            - containerPort: 8082
              name: admin
          env:
            - name: POLICY_FILE
              value: /config/policy.yaml
            - name: SPIFFE_ENDPOINT_SOCKET
              value: "unix:///run/spire/sockets/agent.sock"
            - name: AUDIT_HMAC_KEY
              value: "58af228e1a5b1af2d4f558733522075777a8dc90272c6e1dd54468964ec2f476"   # hex-encoded 32-byte key
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: svid-exchange-data
        - name: config
          configMap:
            name: svid-exchange-config
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: svid-exchange
  namespace: default
spec:
  selector:
    app: svid-exchange
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
    - name: health
      port: 8081
      targetPort: 8081
    - name: admin
      port: 8082
      targetPort: 8082
