---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: svid-exchange-data
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: svid-exchange-policy
  namespace: default
data:
  policy.yaml: |
    # Exchange policies for env-forge provisioned environments.
    # Dynamic policies are added via the admin gRPC API (Step 5).
    # This file serves as the base policy — typically empty for env-forge.
    policies: []
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: svid-exchange
  namespace: default
  labels:
    app: svid-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svid-exchange
  template:
    metadata:
      labels:
        app: svid-exchange
    spec:
      containers:
        - name: svid-exchange
          image: ghcr.io/ngaddam369/svid-exchange:latest
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 8081
              name: health
          env:
            - name: GRPC_ADDR
              value: ":8080"
            - name: HEALTH_ADDR
              value: ":8081"
            - name: POLICY_FILE
              value: /config/policy.yaml
          volumeMounts:
            - name: data
              mountPath: /data
            - name: policy
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: svid-exchange-data
        - name: policy
          configMap:
            name: svid-exchange-policy
---
apiVersion: v1
kind: Service
metadata:
  name: svid-exchange
  namespace: default
spec:
  selector:
    app: svid-exchange
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
    - name: health
      port: 8081
      targetPort: 8081
