---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: saga-conductor-data
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saga-conductor
  namespace: default
  labels:
    app: saga-conductor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saga-conductor
  template:
    metadata:
      labels:
        app: saga-conductor
    spec:
      containers:
        - name: saga-conductor
          image: ghcr.io/ngaddam369/saga-conductor:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 8081
              name: health
          env:
            - name: GRPC_ADDR
              value: ":8080"
            - name: HEALTH_ADDR
              value: ":8081"
            - name: DB_PATH
              value: /data/saga.db
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: saga-conductor-data
---
apiVersion: v1
kind: Service
metadata:
  name: saga-conductor
  namespace: default
spec:
  selector:
    app: saga-conductor
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
    - name: health
      port: 8081
      targetPort: 8081
