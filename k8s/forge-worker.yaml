---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-worker
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-worker
  namespace: default
  labels:
    app: forge-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forge-worker
  template:
    metadata:
      labels:
        app: forge-worker
    spec:
      serviceAccountName: forge-worker
      containers:
        - name: forge-worker
          # Pin to a specific version in production — do not use :latest.
          image: ghcr.io/ngaddam369/env-forge-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9091
              name: worker
          env:
            - name: WORKER_ADDR
              value: ":9091"
            - name: FORGE_API_URL
              value: "http://forge-api.default.svc.cluster.local:9090"
            - name: SPIFFE_ENDPOINT_SOCKET
              value: "unix:///run/spire/sockets/agent.sock"
            - name: SVIDEXCHANGE_ADDR
              value: "svid-exchange.default.svc.cluster.local:8080"
            - name: SVIDEXCHANGE_ADMIN_ADDR
              value: "svid-exchange.default.svc.cluster.local:8082"
            - name: TRUST_DOMAIN
              value: "cluster.local"
            # Use /envfiles (emptyDir) instead of /tmp so readOnlyRootFilesystem works.
            - name: LOCAL_ENV_DIR
              value: /envfiles
            # AWS credentials — remove if using --dry-run only
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_REGION
                  optional: true
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/sockets
              readOnly: true
            - name: envfiles
              mountPath: /envfiles
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
      volumes:
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: Directory
        - name: envfiles
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: forge-worker
  namespace: default
spec:
  selector:
    app: forge-worker
  ports:
    - name: worker
      port: 9091
      targetPort: 9091
