---
# svid-exchange-secret.yaml — AUDIT_HMAC_KEY for audit trail integrity.
#
# IMPORTANT: The key below is a placeholder. Before applying to any non-local
# environment, replace it with a freshly generated 32-byte hex key:
#
#   openssl rand -hex 32
#
# Then create the secret via kubectl (do NOT commit real keys to git):
#
#   kubectl create secret generic svid-exchange-secrets \
#     --from-literal=audit-hmac-key="$(openssl rand -hex 32)" \
#     --namespace=default
#
# Or apply this file only in local/minikube demo environments.
apiVersion: v1
kind: Secret
metadata:
  name: svid-exchange-secrets
  namespace: default
type: Opaque
stringData:
  # Rotate before any non-local deployment.
  audit-hmac-key: "REPLACE_WITH_GENERATED_KEY_SEE_COMMENT_ABOVE"
